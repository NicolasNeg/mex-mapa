<body style="margin:0;padding:0;background:#070d16;">
  <div id="appLoadingSpinner" style="
    position: fixed; inset: 0; background: #070d16;
    display: flex; align-items: center; justify-content: center; z-index: 100;
  ">
    <div style="
      width: 34px; height: 34px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: progSpin .9s linear infinite;
    "></div>
    <style>@keyframes progSpin { to { transform: rotate(360deg); } }</style>
  </div>

  <div id="appRoot" style="display:none;"></div>

  <script src="/js/core/error-logger.js"></script>
  <script src="/js/core/sw-register.js"></script>
