name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generar js/core/firebase-config.js desde secrets
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          mkdir -p js/core
          cat > js/core/firebase-config.js << EOF
          // Generado en CI — configuración cliente Firebase Web (pública por diseño).
          window.FIREBASE_CONFIG = {
            apiKey:            "${FIREBASE_API_KEY}",
            authDomain:        "${FIREBASE_AUTH_DOMAIN}",
            projectId:         "${FIREBASE_PROJECT_ID}",
            storageBucket:     "${FIREBASE_PROJECT_ID}.firebasestorage.app",
            messagingSenderId: "${FIREBASE_MESSAGING_SENDER_ID}",
            appId:             "${FIREBASE_APP_ID}"
          };
          EOF

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MEX_MAPA_BJX }}
          channelId: live
          projectId: mex-mapa-bjx
