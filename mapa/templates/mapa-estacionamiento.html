<!-- ======================================================================
     mapa-estacionamiento.html
     Extension visual para tenants tipo estacionamiento. El shell base sigue
     siendo mapa-core; este bloque solo define la capa de operacion propia.
     ====================================================================== -->
<section class="parking-template-shell" data-business-template="estacionamiento">
  <div class="parking-template-toolbar" id="parking-template-toolbar">
    <div class="parking-template-title">
      <span class="material-icons">local_parking</span>
      <div>
        <strong>Mapa estacionamiento</strong>
        <small data-parking-plaza>Plaza activa</small>
      </div>
    </div>
    <div class="parking-template-meter">
      <span data-parking-occupancy-text>0/0 ocupados</span>
      <div><i data-parking-occupancy-bar></i></div>
    </div>
    <div class="parking-template-actions">
      <button type="button" data-parking-filter="todos">Todos</button>
      <button type="button" data-parking-filter="ocupados">Ocupados</button>
      <button type="button" data-parking-filter="libres">Libres</button>
      <button type="button" data-parking-filter="reservados">Reservados</button>
      <button type="button" data-parking-filter="bloqueados">Bloqueados</button>
    </div>
  </div>
</section>
