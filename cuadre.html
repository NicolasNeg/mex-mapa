<!DOCTYPE html>
<html lang="es" data-page-title="Cuadre de Flota"
  data-page-description="Consola dedicada de gestión de flota de %COMPANY%">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0b2548">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cuadre">
  <meta name="description" content="Consola dedicada de gestión de flota">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/img/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="/img/logo.png">

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="/config.js"></script>
  <script src="/js/core/firebase-init.js"></script>

  <title>Cuadre · Flota</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f8fafc;
    }

    /* ── Loader ── */
    #cuadreLoader {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #060e1c 0%, #0c1e3a 55%, #07152b 100%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.4s ease;
    }
    #cuadreLoader.ready {
      opacity: 0;
      pointer-events: none;
    }
    #cuadreLoader.hidden {
      display: none;
    }
    .cuadre-loader-logo {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cuadre-loader-logo img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      filter: brightness(0) invert(1);
      opacity: 0.9;
    }
    .cuadre-loader-text {
      color: rgba(255,255,255,0.75);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .cuadre-loader-spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: rgba(255,255,255,0.75);
      border-radius: 50%;
      animation: cuadreSpin 0.85s linear infinite;
    }
    @keyframes cuadreSpin {
      to { transform: rotate(360deg); }
    }

    /* ── Iframe ── */
    #cuadreFrame {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
      background: #f8fafc;
    }
  </style>
</head>

<body>

  <!-- Loader mientras carga el frame -->
  <div id="cuadreLoader">
    <div class="cuadre-loader-logo">
      <img src="/img/logo.png" alt="MEX">
    </div>
    <div class="cuadre-loader-text">Cargando consola de flota…</div>
    <div class="cuadre-loader-spinner"></div>
  </div>

  <iframe
    id="cuadreFrame"
    title="Consola de flota"
    loading="eager"
    allow="geolocation; clipboard-read; clipboard-write"
    referrerpolicy="same-origin">
  </iframe>

  <script src="/js/core/database.js" type="module"></script>
  <script type="module">
    import { auth } from '/js/core/database.js';

    const loader  = document.getElementById('cuadreLoader');
    const frame   = document.getElementById('cuadreFrame');

    function buildFrameUrl() {
      const params = new URLSearchParams(window.location.search);
      const tab = params.get('tab') || 'normal';
      return `/mapa?fleet=1&tab=${encodeURIComponent(tab)}`;
    }

    function hideLoader() {
      if (!loader) return;
      loader.classList.add('ready');
      setTimeout(() => loader.classList.add('hidden'), 420);
    }

    frame.addEventListener('load', hideLoader, { once: true });

    // Fallback: si el frame tarda más de 12s, ocultamos el loader de todas formas
    setTimeout(hideLoader, 12000);

    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.replace('/login');
        return;
      }
      frame.src = buildFrameUrl();
    });
  </script>

</body>
</html>
