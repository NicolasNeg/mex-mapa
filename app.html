<!DOCTYPE html>
<html class="light" lang="es" data-page-title="App">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>MapGestion — Panel Operativo</title>

  <!-- SEO -->
  <meta name="description" content="Panel de control operativo MapGestion. Gestiona tu flota vehicular en tiempo real: estados de unidades, cuadres, incidencias y comunicación interna.">
  <meta name="robots" content="noarchive, max-snippet:160">
  <link rel="canonical" href="https://app.mapgestion.com/app">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="MapGestion">
  <meta property="og:locale" content="es_MX">
  <meta property="og:title" content="MapGestion — Panel Operativo de Flotas">
  <meta property="og:description" content="Control de flota vehicular en tiempo real. Estados, cuadres, incidencias y personal — todo en tu panel MapGestion.">
  <meta property="og:url" content="https://app.mapgestion.com">
  <meta property="og:image" content="https://app.mapgestion.com/img/logo.png">

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="MapGestion — Panel Operativo">
  <meta name="twitter:description" content="Control de flota vehicular en tiempo real desde cualquier dispositivo.">

  <meta name="theme-color" content="#07111f">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/img/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="/img/logo.png">

  <!-- Tailwind & Fuentes -->
  <script defer src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <!-- Material Icons (clásico) — lo usa el panel global BUSCAR UNIDAD -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>

  <!-- Shell CSS (Fase 1). CSS de vistas se inyecta al montar cada vista (FOUC controlado sin preload huérfano). -->
  <link rel="stylesheet" href="/css/shell.css">
  <link rel="stylesheet" href="/css/dialogs.css">
  <link rel="stylesheet" href="/css/app-notifications.css">

  <!-- Tailwind custom config -->
  <script src="/js/tailwind-config.js"></script>

  <!-- Firebase SDKs compat (misma versión que el resto del proyecto) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>

  <!-- Configuración y core (mismo orden que home.html) -->
  <script src="/js/core/firebase-config.js"></script>
  <script src="/js/core/firebase-init.js"></script>
  <script src="/js/core/dialogs.js"></script>
  <script src="/mex-api.js"></script>
  <script src="/api/helpers.js"></script>
  <script src="/api/auth.js"></script>
  <script src="/api/mapa.js"></script>
  <script src="/api/cuadre.js"></script>
  <script src="/api/traslados.js"></script>
  <script src="/api/externos.js"></script>
  <script src="/api/flota.js"></script>
  <script src="/api/alertas.js"></script>
  <script src="/api/notas.js"></script>
  <script src="/api/historial.js"></script>
  <script src="/api/settings.js"></script>
  <script src="/api/users.js"></script>
  <script src="/api/_assemble.js"></script>
  <script src="/js/core/app-bootstrap.js"></script>
  <script src="/js/core/feature-gates.js"></script>
</head>
<body>
  <!--
    Spinner visible mientras app-bootstrap.js resuelve la config
    y main.js espera el estado de auth.
    main.js lo elimina en cuanto el shell esté montado.
  -->
  <div id="appLoadingSpinner" style="
    position: fixed;
    inset: 0;
    background: #07111f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 100;
  ">
    <div style="
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #2ecc71;
      border-radius: 50%;
      animation: appSpin 0.9s linear infinite;
    "></div>
    <div style="text-align:center;">
      <div id="mexAppBootstrapTitle" style="font-family:Inter,sans-serif;font-size:13px;font-weight:600;color:rgba(255,255,255,0.7);margin-bottom:4px;">Iniciando...</div>
      <div id="mexAppBootstrapSubtitle" style="font-family:Inter,sans-serif;font-size:11px;color:rgba(255,255,255,0.35);"></div>
    </div>
    <style>@keyframes appSpin { to { transform: rotate(360deg); } }</style>
  </div>

  <!-- Raíz de la app — oculta hasta que main.js la active -->
  <div id="appRoot" style="display:none;"></div>

  <script src="/js/core/error-logger.js"></script>
  <script src="/js/core/sw-register.js"></script>
  <!-- Buscador global (panel BUSCAR UNIDAD) a nivel shell: FAB + lo abre el header -->
  <script src="/js/views/mapa-buscador.js" defer></script>
  <script type="module" src="/js/app/main.js"></script>
</body>
</html>
